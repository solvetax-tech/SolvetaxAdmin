services:
  solvetax-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_PUBLIC_API_KEY: ${VITE_PUBLIC_API_KEY:-}
    image: solvetax-api:local
    container_name: solvetax-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
