# Production: nginx (80/443) + API (internal). Use after DNS points to this VM.
#
#   cp .env.example .env   # set DOMAIN, CERTBOT_EMAIL, secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#   bash deploy/azure-vm/init-letsencrypt.sh   # first-time HTTPS

services:
  solvetax-api:
    image: ${API_IMAGE:-solvetax-api:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_PUBLIC_API_KEY: ${VITE_PUBLIC_API_KEY:-}
    container_name: solvetax-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 1
    networks:
      - solvetax
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    container_name: solvetax-nginx
    restart: unless-stopped
    depends_on:
      solvetax-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/azure-vm/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/azure-vm/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    networks:
      - solvetax

  # One-off / cron: docker compose -f docker-compose.prod.yml --profile tools run --rm certbot ...
  certbot:
    profiles: ["tools"]
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: ["certbot"]
    networks:
      - solvetax

  # Optional background renewal loop.
  certbot-renew:
    profiles: ["renew"]
    image: certbot/certbot:latest
    container_name: solvetax-certbot-renew
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: /bin/sh
    command: >
      -c "trap exit TERM;
          while :; do
            certbot renew --webroot -w /var/www/certbot --quiet || true;
            sleep 12h;
          done"
    networks:
      - solvetax

networks:
  solvetax:
    driver: bridge

volumes:
  certbot-www:
  certbot-conf:
