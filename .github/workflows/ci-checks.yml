# CI gate for the PROD path. Runs on every PR into `prod` (and on demand).
# Nothing here pushes or deploys — it only proves the change is sound. Pair it
# with branch protection on `prod` (require these checks + 1 review) so a PR
# can't merge until they're green. The real deploy runs after merge, in
# deploy-prod.yml.

name: CI checks (PR to prod)

on:
  pull_request:
    branches: [prod]
  workflow_dispatch:

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend
      # ADVISORY for now: the repo has a large pre-existing ESLint backlog
      # (~181 errors) unrelated to any single change. continue-on-error keeps the
      # issues visible in the log without blocking merges. Once the backlog is
      # cleared, remove continue-on-error and mark this a required check.
      - name: ESLint (advisory)
        continue-on-error: true
        run: npm run lint
        working-directory: frontend

  backend-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Compiles every .py in backend/ and the migration runner — catches syntax
      # errors without needing a database or the full dependency install.
      - name: Syntax compile (backend + migration runner)
        run: python -m compileall -q backend db

  # BLOCKING: introduced in Workflow Builder Slice 0.
  # Runs all backend unit tests with a real Postgres 16 + Redis 7 service.
  # Must pass before a PR can merge to prod; update branch protection accordingly.
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: solvetax
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: solvetax_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: solvetax_test
      DB_USER: solvetax
      DB_PASSWORD: testpass
      DB_SCHEMA: solvetax
      DB_SSL: disable
      TEST_DATABASE_URL: postgresql://solvetax:testpass@localhost:5432/solvetax_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Apply migrations to test DB
        run: python db/migrate/run_migrations.py
      - name: Run backend tests
        run: pytest backend/whatsapp/tests/ -v

  image-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Building the image is the comprehensive gate: npm ci + vite build
      # (frontend), pip install (backend deps incl. the migration runner's
      # asyncpg/pyyaml), and the COPY of db/ + entrypoint. If this is green, the
      # exact artifact that would ship to PROD packages cleanly. No push.
      - name: Build production image
        run: |
          docker build \
            --build-arg VITE_PUBLIC_API_KEY="${{ secrets.VITE_PUBLIC_API_KEY }}" \
            -t solvetax-admin:ci \
            .
